<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>Susie &amp; Dima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ color-scheme:dark; --void:#170c1f; --plum:#241233; --gold:#c9a557; --goldb:#f2d692; --rose:#c98b87; --cream:#f6ecd4; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--cream);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;overflow:hidden;position:relative;
    background:
      radial-gradient(ellipse 90% 55% at 50% 20%, rgba(90,40,70,.5), transparent 70%),
      linear-gradient(180deg, var(--plum) 0%, var(--void) 75%);
  }
  canvas#dust{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .frame{position:fixed;inset:16px;border:1.5px solid rgba(201,165,87,.35);border-radius:22px;pointer-events:none;z-index:1;}
  .frame:after{content:'';position:absolute;inset:7px;border:1px solid rgba(201,165,87,.18);border-radius:16px;}
  .wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;max-width:520px;
    animation:rise 1.1s ease both;}
  .crest{font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  .monogram{width:112px;height:112px;margin-bottom:8px;animation:pop 1.1s .1s cubic-bezier(.2,1.4,.4,1) both;}
  h1{font-family:'Cormorant Garamond',serif;font-weight:700;line-height:1;margin:0;
    font-size:clamp(46px,15vw,84px);
    background:linear-gradient(180deg,#fbe7bf,var(--gold) 55%,#9d7a34);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 40px rgba(201,165,87,.2);}
  h1 .amp{display:block;font-size:.42em;font-weight:500;opacity:.85;margin:-.05em 0;}
  .rule{width:120px;height:1px;margin:26px 0 22px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative;}
  .rule:before{content:'✦';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    color:var(--goldb);font-size:12px;background:var(--void);padding:0 8px;}
  .msg{font-family:'Cormorant Garamond',serif;font-size:clamp(21px,5.5vw,28px);color:#eaddbe;line-height:1.4;}
  .sub{margin-top:16px;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--rose);opacity:.8;}
  @keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
  @keyframes pop{from{opacity:0;transform:scale(.6) rotate(-8deg);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;}}
</style>
</head>
<body>
  <canvas id="dust"></canvas>
  <div class="frame"></div>
  <div class="wrap">
    <div class="crest">The Wedding Celebration of</div>
    <svg class="monogram" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="46" stroke="url(#g)" stroke-width="1.4" opacity=".7"/>
      <circle cx="50" cy="50" r="41" stroke="url(#g)" stroke-width=".7" opacity=".4"/>
      <text x="50" y="61" text-anchor="middle" font-family="Cormorant Garamond,serif" font-weight="700" font-size="40" fill="url(#g)">S&amp;D</text>
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbe7bf"/><stop offset="1" stop-color="#a5813a"/></linearGradient></defs>
    </svg>
    <h1>Susie<span class="amp">&amp;</span>Dima</h1>
    <div class="rule"></div>
    <div class="msg">Something beautiful is on its way.</div>
    <div class="sub">Please check back soon</div>
  </div>
<script>
(function(){
  var cv=document.getElementById('dust'),c=cv.getContext('2d'),W,H,P=[];
  function size(){var d=window.devicePixelRatio||1;W=cv.width=innerWidth*d;H=cv.height=innerHeight*d;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';}
  size();var d=window.devicePixelRatio||1,N=Math.min(40,Math.floor(innerWidth/14));
  for(var i=0;i<N;i++)P.push({x:Math.random()*W,y:Math.random()*H,r:(Math.random()*1.5+.4)*d,s:Math.random()*.22+.04,a:Math.random()*.5+.2,ph:Math.random()*6});
  function f(t){c.clearRect(0,0,W,H);for(var i=0;i<P.length;i++){var p=P[i];p.y-=p.s;p.x+=Math.sin(t/2600+p.ph)*.14;if(p.y<-4){p.y=H+4;p.x=Math.random()*W;}var tw=p.a*(.6+.4*Math.sin(t/800+p.ph));c.beginPath();c.arc(p.x,p.y,p.r,0,7);c.fillStyle='rgba(242,214,146,'+tw+')';c.shadowBlur=6*d;c.shadowColor='rgba(242,214,146,.6)';c.fill();}requestAnimationFrame(f);}
  requestAnimationFrame(f);addEventListener('resize',size);
})();
</script>
</body>
</html>
