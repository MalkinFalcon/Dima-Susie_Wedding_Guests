<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --bg: #ece4f0;
    --paper: #fbf8f3;
    --ink: #2a2a2a;
    --muted: #7a7268;
    --line: #d9cfc1;
    --accent: #6b8a6e;
    --accent-2: #c98b87;
    --gold: #b08d4f;
    --danger: #c0584d;
    --plum: #3A2342;
    --claret: #7A2E3B;
    --shadow: 0 10px 30px rgba(60,40,20,.08), 0 2px 6px rgba(60,40,20,.05);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    overflow: hidden;
  }
  h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 600; letter-spacing: .01em; margin: 0; }

  .app {
    display: grid;
    grid-template-columns: 1fr 400px;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }
  .topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 28px;
    background: linear-gradient(180deg, var(--paper), rgba(251,248,243,.85));
    border-bottom: 1px solid var(--line);
    z-index: 5;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 { font-size: 24px; }
  .brand small { color: var(--muted); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; }
  .stats { display: flex; gap: 18px; color: var(--muted); font-size: 13px; }
  .stats b { color: var(--ink); font-weight: 600; }
  .actions button {
    background: transparent; border: 1px solid var(--line); padding: 7px 12px; border-radius: 999px;
    font: inherit; font-size: 12px; color: var(--muted); cursor: pointer; margin-left: 6px;
    transition: all .15s ease;
  }
  .actions button:hover { color: var(--ink); border-color: var(--ink); }

  /* ---------- FLOOR ---------- */
  .floor-wrap {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 0%, rgba(122,46,59,.10), transparent 60%),
      var(--bg);
  }
  .floor-wrap.panning { cursor: grabbing; }
  .floor-wrap.dragging { cursor: grabbing; }
  .drag-ghost {
    position: fixed; z-index: 200; pointer-events: none;
    background: var(--paper); color: var(--ink);
    border: 2px solid var(--ink); border-left-width: 5px;
    padding: 3px 9px; border-radius: 7px; font-size: 12px; font-weight: 600;
    box-shadow: 0 8px 20px rgba(60,40,20,.22);
    max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .world {
    position: absolute; top: 0; left: 0;
    width: 1000px; height: 1600px;
    transform-origin: 0 0;
    will-change: transform;
  }
  .floor-art { position: absolute; inset: 0; width: 1000px; height: 1600px; pointer-events: none; }
  .floor-art svg { display: block; width: 1000px; height: 1600px; }
  .hitlayer { position: absolute; inset: 0; width: 1000px; height: 1600px; pointer-events: none;
    user-select: none; -webkit-user-select: none; }

  .seat-node {
    position: absolute; width: 28px; height: 28px;
    border-radius: 50%; box-sizing: border-box;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    border: 2.4px solid transparent;
    user-select: none; -webkit-user-select: none;
  }
  .seat-node.occupied { cursor: grab; background: rgba(255,255,255,.02); }
  .seat-node.occupied:active { cursor: grabbing; }
  .seat-node.solo { animation: pulse .9s ease infinite alternate; }
  @keyframes pulse { from { box-shadow: 0 0 0 0 rgba(201,139,135,.7); } to { box-shadow: 0 0 0 4px rgba(201,139,135,.35); } }
  .seat-node.seat-drop { background: rgba(107,138,110,.35); border-color: var(--accent); }
  .seat-name {
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 8px;
    color: #2a2a2a; pointer-events: none; user-select: none; white-space: nowrap;
    line-height: 1;
  }

  .table-handle {
    position: absolute; width: 54px; height: 54px;
    border-radius: 50%; box-sizing: border-box;
    pointer-events: auto; cursor: grab;
    border: 2.5px solid transparent;
    transition: border-color .12s ease;
    user-select: none; -webkit-user-select: none;
  }
  .table-handle:hover { border-color: rgba(122,46,59,.5); }
  .table-handle:active { cursor: grabbing; }
  .table-handle.table-drop { border-color: var(--accent); border-width: 4px; }

  .zoom-controls {
    position: absolute; bottom: 18px; left: 18px; z-index: 10;
    display: flex; flex-direction: column; gap: 6px;
  }
  .zoom-controls button {
    width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--paper);
    font-size: 17px; color: var(--muted); cursor: pointer; box-shadow: var(--shadow);
  }
  .zoom-controls button:hover { color: var(--ink); border-color: var(--ink); }
  .zoom-hint {
    position: absolute; bottom: 18px; right: 18px; z-index: 10;
    font-size: 11px; color: var(--muted);
    background: var(--paper); border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 12px; box-shadow: var(--shadow);
  }
  .zoom-level {
    position: absolute; top: 14px; left: 18px; z-index: 10;
    font-size: 11px; color: var(--muted);
    background: var(--paper); border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 11px; box-shadow: var(--shadow); font-weight: 600;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    background: var(--paper);
    border-left: 1px solid var(--line);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .side-head { padding: 14px 20px 6px; }
  .side-head h2 { font-size: 21px; }
  .side-head .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .filter { margin: 8px 20px 4px; display: flex; gap: 6px; flex-wrap: wrap; }
  .filter button {
    background: transparent; border: 1px solid var(--line); padding: 4px 10px; border-radius: 999px;
    font: inherit; font-size: 11px; color: var(--muted); cursor: pointer;
  }
  .filter button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .groups { flex: 1; overflow-y: auto; padding: 10px 16px 30px; min-height: 0; }
  .cat-section { margin-bottom: 14px; }
  .cat-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; color: var(--muted); margin: 8px 4px 6px;
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--line); padding-bottom: 4px;
  }
  .cat-title .pill { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .group { background: #fff; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 6px; overflow: hidden; transition: all .12s ease; }
  .group:hover { border-color: var(--accent); box-shadow: 0 4px 10px rgba(60,40,20,.06); }
  .group.seated { background: #f4efe6; }
  .g-head { display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: grab; }
  .group.seated .g-head { opacity: .55; }
  .g-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gc, var(--accent)); flex-shrink: 0; }
  .g-label { flex: 1; min-width: 0; font-size: 13px; line-height: 1.3; }
  .g-where { font-size: 10px; color: var(--accent); margin-top: 1px; letter-spacing: .03em; }
  .g-where.partial { color: var(--accent-2); }
  .g-badge { background: var(--ink); color: var(--paper); border-radius: 999px; font-size: 11px; padding: 2px 7px; font-weight: 600; white-space: nowrap; }
  .group.seated .g-badge { background: var(--accent); }
  .g-expand { border: 0; background: transparent; cursor: pointer; color: var(--muted); font-size: 11px; padding: 2px 4px; flex-shrink: 0; transition: transform .15s ease; }
  .g-expand.open { transform: rotate(90deg); }
  .g-members { border-top: 1px dashed var(--line); padding: 4px 10px 8px; }
  .member { display: flex; align-items: center; gap: 6px; padding: 3px 2px; font-size: 12px; border-radius: 6px; cursor: grab; }
  .member:hover { background: rgba(107,138,110,.07); }
  .member .m-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .member .m-name input { font: inherit; width: 100%; border: 0; outline: none; background: #fff; border-bottom: 1px dashed var(--accent); padding: 1px 2px; }
  .member .m-at { font-size: 10px; color: var(--accent); white-space: nowrap; }
  .member .m-edit { border: 0; background: transparent; cursor: pointer; font-size: 11px; color: var(--muted); opacity: 0; padding: 1px 3px; }
  .member:hover .m-edit { opacity: 1; }
  .member .m-edit:hover { color: var(--ink); }
  .groups::-webkit-scrollbar { width: 8px; }
  .groups::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  .hint { font-size: 11px; color: var(--muted); padding: 8px 20px 10px; border-top: 1px solid var(--line); background: #f1ebdf; line-height: 1.5; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper);
    padding: 9px 18px; border-radius: 999px; font-size: 12.5px;
    box-shadow: var(--shadow); z-index: 100; animation: toastIn .2s ease; pointer-events: none;
  }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>

const GROUPS = RAW_GUESTS.map((entry, i) => {

/* ---------- PARSE SVG ---------- */
const FLOOR_SVG = document.getElementById('floor-svg').textContent;
const SEAT_RE = /id="table-(\d+)-seat-(\d+)"[^>]*?cx="([-\d.]+)"[^>]*?cy="([-\d.]+)"/g;
const SEATS = [];        // {table:'table-1', num:1, cx, cy}

{

const SEAT_POS = {};     // 'table-1' -> {1:{cx,cy},...}
Object.entries(SEAT_INDEX).forEach(([t, arr]) => { SEAT_POS[t] = {}; arr.forEach(s => { SEAT_POS[t][s.num] = s; }); });

/* table meta ordered by number */
const TABLE_LABEL_RE = /id="table-(\d+)-label"[\s\S]*?x="([-\d.]+)"\s+y="([-\d.]+)"/g;
const LABEL_POS = {};
{ let m; while ((m = TABLE_LABEL_RE.exec(FLOOR_SVG)) !== null) LABEL_POS['table-' + m[1]] = { x: parseFloat(m[2]), y: parseFloat(m[3]) }; }

const TABLES = Object.keys(SEAT_INDEX)
  .sort((a, b) => parseInt(a.split('-')[1]) - parseInt(b.split('-')[1]))
  .map(id => {
    const seats = SEAT_INDEX[id];

  });
const TABLES_BY_ID = Object.fromEntries(TABLES.map(t => [t.id, t]));
const TOTAL_CAPACITY = TABLES.reduce((s, t) => s + t.cap, 0);

/* old slot positions (previous app) for migration mapping */
const OLD_SLOTS = {
  s1:[3,18], s2:[3,33], s3:[3,48], s4:[3,63],
  s5:[82,4], s6:[82,19], s7:[82,34], s8:[82,49],
  s9:[65,4], s10:[65,19], s11:[65,34], s12:[65,49],

};

const STORAGE_V2 = 'wedding-seating-v2';
const STORAGE_V3 = 'wedding-seating-v3';

/* logical table numbering by visual position: left/right columns interleaved, top to bottom */
const computeTableNumbers = (offsets) => {
  const pos = TABLES.map(t => {
    const o = (offsets && offsets[t.id]) || { dx: 0, dy: 0 };
    return { id: t.id, x: t.cx + (o.dx || 0), y: t.cy + (o.dy || 0) };
  });
  const left = pos.filter(p => p.x < 500).sort((a, b) => a.y - b.y);
  const right = pos.filter(p => p.x >= 500).sort((a, b) => a.y - b.y);
  const map = {};
  let n = 1;
  for (let i = 0; i < Math.max(left.length, right.length); i++) {
    if (i < left.length) map[left[i].id] = n++;
    if (i < right.length) map[right[i].id] = n++;
  }
  return map;
};

const groupColor = (gid) => {
  let h = 0;
  for (let i = 0; i < gid.length; i++) h = (h * 31 + gid.charCodeAt(i)) % 360;
  return `hsl(${h}, 42%, 52%)`;
};
const firstNameOf = (full) => (full || '').split(/\s+/)[0];
const displayName = (names, p) => names[p.id] || p.defaultName;

/* ---------- STATE ---------- */
const emptyState = () => ({ seating: {}, names: {}, offsets: {} });

/* auto-seat everyone sequentially (fallback / demo) */
const autoSeat = () => {
  const seating = {};
  let ti = 0, seat = 1;
  for (const g of GROUPS) {
    for (const p of g.members) {
      while (ti < TABLES.length && seat > TABLES[ti].cap) { ti++; seat = 1; }
      if (ti >= TABLES.length) break;
      seating[p.id] = { table: TABLES[ti].id, seat };
      seat++;
    }
  }
  return { seating, names: {}, offsets: {} };
};

/* migrate from previous app's v2 (group-per-table) onto the SVG tables */
const migrateFromV2 = () => {
  let v2;
  try { v2 = JSON.parse(localStorage.getItem(STORAGE_V2)); } catch { return null; }
  if (!v2 || !v2.seating || Object.keys(v2.seating).length === 0) return null;

  // group old seating by old tableId, preserving seat order
  const oldTables = {}; // tableId -> [{pid, seat}]
  Object.entries(v2.seating).forEach(([pid, s]) => {
    if (!PEOPLE_BY_ID[pid]) return;
    (oldTables[s.tableId] = oldTables[s.tableId] || []).push({ pid, seat: s.seat });
  });
  const oldMeta = {}; // tableId -> {pos:[x,y], count}
  (v2.tables || []).forEach(t => {
    const slot = OLD_SLOTS[t.slotId] || [50, 50];
    oldMeta[t.id] = { pos: slot };
  });
  const oldList = Object.entries(oldTables).map(([tid, arr]) => {
    arr.sort((a, b) => a.seat - b.seat);
    const pos = (oldMeta[tid] && oldMeta[tid].pos) || [50, 50];
    return { tid, people: arr.map(x => x.pid), count: arr.length, pos };
  });
  if (oldList.length === 0) return null;

  // new tables normalized positions
  const newList = TABLES.map(t => ({ id: t.id, cap: t.cap, pos: [t.cx / 1000 * 100, t.cy / 1600 * 100] }));

  // greedy: assign each old table to nearest new table with cap>=count (prefer exact cap)
  const usedNew = new Set();
  const seating = {};
  // sort old by count desc so big tables claim exact matches first
  oldList.sort((a, b) => b.count - a.count);
  for (const ot of oldList) {
    let best = null, bestScore = Infinity;
    for (const nt of newList) {
      if (usedNew.has(nt.id) || nt.cap < ot.count) continue;
      const dx = nt.pos[0] - ot.pos[0], dy = nt.pos[1] - ot.pos[1];
      const dist = Math.sqrt(dx * dx + dy * dy);
      const capPenalty = (nt.cap - ot.count) * 40; // strongly prefer exact fit
      const score = dist + capPenalty;
      if (score < bestScore) { bestScore = score; best = nt; }
    }
    if (!best) continue;
    usedNew.add(best.id);
    ot.people.forEach((pid, i) => { seating[pid] = { table: best.id, seat: i + 1 }; });
  }
  return { seating, names: v2.names || {}, offsets: {} };
};

const loadState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_V3);
    if (raw) {
      const st = JSON.parse(raw);
      if (st && st.seating && st.names) {
        Object.keys(st.seating).forEach(pid => { if (!PEOPLE_BY_ID[pid]) delete st.seating[pid]; });
        if (!st.offsets) st.offsets = {};
        // one-time patch: move Freddy, Liza, Karin (g80) to table-13
        if (!st.patchFLK13) {
          const g = GROUPS_BY_ID['g80'];
          if (g) {
            const occ = new Set(Object.entries(st.seating)
              .filter(([pid, s]) => s.table === 'table-13' && !g.members.some(m => m.id === pid))
              .map(([, s]) => s.seat));
            g.members.forEach(p => {
              let seat = 1;
              while (occ.has(seat)) seat++;
              st.seating[p.id] = { table: 'table-13', seat };
              occ.add(seat);
            });
          }
          st.patchFLK13 = true;
        }
        // one-time patch: UNDO the 12+13 oval merge — send seats 10-19 back to table-13 as 1-10.
        if (!st.patchUnmerge1213) {
          Object.entries(st.seating).forEach(([pid, s]) => {
            if (s.table === 'table-12' && s.seat > 9) st.seating[pid] = { table: 'table-13', seat: s.seat - 9 };
          });
          st.patchUnmerge1213 = true;
        }
        // one-time patch: seat AaronF at table-13 (first free seat)
        if (!st.patchAaronF13) {
          const g = GROUPS.find(x => x.label === 'AaronF');
          if (g && g.members[0] && !st.seating[g.members[0].id]) {
            const occ = new Set(Object.values(st.seating).filter(s => s.table === 'table-13').map(s => s.seat));
            let seat = 1; while (occ.has(seat)) seat++;
            st.seating[g.members[0].id] = { table: 'table-13', seat };
          }
          st.patchAaronF13 = true;
        }
        // one-time patch: merge Table 1 into Table 13 (pill). Table-1 people become table-13 seats 12-20.
        if (!st.patchMerge1into13) {
          Object.entries(st.seating).forEach(([pid, s]) => {
            if (s.table === 'table-1') st.seating[pid] = { table: 'table-13', seat: s.seat + 11 };
          });
          st.patchMerge1into13 = true;
        }
        // one-time patch: after the 1+13 pill merge, clear stale offsets for the removed ids.
        if (!st.patchFixOffsets1213) {
          const o = st.offsets || {};
          if (o['table-1']) o['table-12'] = o['table-1'];
          else delete o['table-12'];
          delete o['table-1'];
          delete o['table-13'];
          st.offsets = o;
          st.patchFixOffsets1213 = true;
        }
        // one-time patch: the transferred offset above was wrong for rearranged layouts and
        // could stack table-12 on the pill — reset it; the user can now drag it anywhere.
        if (!st.patchClear12Offset) {
          if (st.offsets) delete st.offsets['table-12'];
          st.patchClear12Offset = true;
        }
        // one-time patch: place table-12 into the ONE vacant original table spot
        // (the position freed when table "1" was merged into the pill). Computed live
        // against the user's actual layout, so no position guessing.
        if (!st.patchPlace12InGap) {
          const BASES = [[154,334],[159,557],[162,785],[164,1016],[396,1022],[630,1022],
                         [852,147],[852,370],[852,588],[852,809],[852,1030],[852,1251],[852,1474]];
          const occupied = [];
          TABLES.forEach(t => {
            if (t.id === 'table-12') return; // we're the one being placed
            const o = (st.offsets && st.offsets[t.id]) || { dx: 0, dy: 0 };
            const cx = t.cx + (o.dx || 0), cy = t.cy + (o.dy || 0);
            occupied.push([cx, cy]);
            if (t.id === 'table-13') { occupied.push([cx, cy - 115]); occupied.push([cx, cy + 115]); } // pill spans two spots
          });
          const vacant = BASES.filter(b => occupied.every(p => Math.hypot(p[0]-b[0], p[1]-b[1]) > 100));
          if (vacant.length >= 1) {
            const t12 = TABLES.find(t => t.id === 'table-12');
            const spot = vacant[0];
            st.offsets = st.offsets || {};
            st.offsets['table-12'] = { dx: Math.round(spot[0] - t12.cx), dy: Math.round(spot[1] - t12.cy) };
          }
          st.patchPlace12InGap = true;
        }
        // one-time patch: move Dados & Dadon from table-8 to table-12 (first free seats)
        if (!st.patchDados12) {
          const g = GROUPS.find(x => x.label === 'Dados, Dadon');
          if (g) {
            const occ = new Set(Object.entries(st.seating)
              .filter(([pid, s]) => s.table === 'table-12' && !g.members.some(m => m.id === pid))
              .map(([, s]) => s.seat));
            g.members.forEach(p => {
              let seat = 1;
              while (occ.has(seat)) seat++;
              st.seating[p.id] = { table: 'table-12', seat };
              occ.add(seat);
            });
          }
          st.patchDados12 = true;
        }
        // reseat anyone whose seat no longer exists (e.g. a table was compressed to fewer seats)
        const stranded = [];
        Object.entries(st.seating).forEach(([pid, s]) => {
          const t = TABLES_BY_ID[s.table];
          if (!t || s.seat < 1 || s.seat > t.cap) stranded.push(pid);
        });
        stranded.forEach(pid => {
          const tableId = st.seating[pid].table;
          delete st.seating[pid];
          const t = TABLES_BY_ID[tableId];
          if (!t) return;
          const occ = new Set(Object.values(st.seating).filter(x => x.table === tableId).map(x => x.seat));
          for (let i = 1; i <= t.cap; i++) { if (!occ.has(i)) { st.seating[pid] = { table: tableId, seat: i }; break; } }
        });
        return st;
      }
    }
  } catch {}
  return migrateFromV2() || autoSeat();
};

/* ---------- APP ---------- */
function App() {
  const [state, setState] = useState(loadState);
  const [filter, setFilter] = useState('all');
  const [editingPersonId, setEditingPersonId] = useState(null);
  const [soloPid, setSoloPid] = useState(null);
  const [toast, setToast] = useState(null);
  const [focusReq, setFocusReq] = useState(null);
  const toastTimer = useRef(null);

  /* ---- custom pointer-based drag (robust across zoom / selection / double-clicks) ---- */
  const [drag, setDrag] = useState(null);
  const dragRef = useRef(null);
  const floorApiRef = useRef(null);

  const startDrag = useCallback((info, e) => {
    if (e.button != null && e.button !== 0) return;
    e.preventDefault();
    const d = { ...info, sx: e.clientX, sy: e.clientY, clientX: e.clientX, clientY: e.clientY, started: false };
    dragRef.current = d;
    setDrag(d);
    // attach listeners synchronously so the very first mousemove is captured (no effect-timing gap)
    const move = (ev) => {
      const dd = dragRef.current; if (!dd) return;
      if (!dd.started) {
        if (Math.abs(ev.clientX - dd.sx) < 4 && Math.abs(ev.clientY - dd.sy) < 4) return;
        dd.started = true;
      }
      dd.clientX = ev.clientX; dd.clientY = ev.clientY;
      setDrag({ ...dd });
      if (floorApiRef.current) floorApiRef.current.hover(ev.clientX, ev.clientY);
    };
    const up = (ev) => {
      const dd = dragRef.current;
      if (dd && dd.started && floorApiRef.current) floorApiRef.current.drop(dd, ev.clientX, ev.clientY);
      if (floorApiRef.current) floorApiRef.current.hover(null, null);
      dragRef.current = null;
      setDrag(null);
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  }, []);

  useEffect(() => { localStorage.setItem(STORAGE_V3, JSON.stringify(state)); }, [state]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2200);
  }, []);

  const seatedCount = Object.keys(state.seating).length;
  const tableNums = useMemo(() => computeTableNumbers(state.offsets), [state.offsets]);

  const occupantAt = (seating, table, seat) =>
    Object.keys(seating).find(pid => seating[pid].table === table && seating[pid].seat === seat);
  const firstFree = (seating, table) => {
    const cap = TABLES_BY_ID[table].cap;
    const occ = new Set(Object.values(seating).filter(s => s.table === table).map(s => s.seat));
    for (let i = 1; i <= cap; i++) if (!occ.has(i)) return i;
    return null;
  };

  const seatGroupAt = (groupId, table, startSeat) => {
    const g = GROUPS_BY_ID[groupId];
    if (!g) return;
    setState(prev => {
      const seating = { ...prev.seating };
      g.members.forEach(p => delete seating[p.id]);
      const cap = TABLES_BY_ID[table].cap;
      const occ = new Set(Object.values(seating).filter(s => s.table === table).map(s => s.seat));
      const free = [];
      let s = startSeat || 1;
      for (let k = 0; k < cap && free.length < g.members.length; k++) {
        const seat = ((s - 1 + k) % cap) + 1;
        if (!occ.has(seat)) free.push(seat);
      }
      g.members.forEach((p, i) => { if (free[i] != null) seating[p.id] = { table, seat: free[i] }; });
      return { ...prev, seating };
    });
  };

  const seatPersonAt = (personId, table, seat) => {
    setState(prev => {
      const seating = { ...prev.seating };
      const prevPos = seating[personId] ? { ...seating[personId] } : null;
      let target = seat;
      if (target == null) { delete seating[personId]; target = firstFree(seating, table); if (target == null) return prev; }
      const occ = occupantAt(seating, table, target);
      delete seating[personId];
      if (occ && occ !== personId) {
        if (prevPos && !(prevPos.table === table && prevPos.seat === target)) seating[occ] = prevPos;
        else { const f = firstFree(seating, table); if (f != null) seating[occ] = { table, seat: f }; }
      }
      seating[personId] = { table, seat: target };
      return { ...prev, seating };
    });
  };

  const unseatGroup = (groupId) => {
    const g = GROUPS_BY_ID[groupId]; if (!g) return;
    setState(prev => { const seating = { ...prev.seating }; g.members.forEach(p => delete seating[p.id]); return { ...prev, seating }; });
  };
  const unseatPerson = (personId) => {
    setState(prev => { const seating = { ...prev.seating }; delete seating[personId]; return { ...prev, seating }; });
  };

  const renamePerson = (personId, fullName) => {
    setState(prev => {
      const names = { ...prev.names };
      const t = (fullName || '').trim();
      if (t && t !== PEOPLE_BY_ID[personId].defaultName) names[personId] = t; else delete names[personId];
      return { ...prev, names };
    });
  };

  const resetToMigration = () => {
    if (confirm('Re-import your original allocation from the previous version (overwrites current)?')) {
      setState(migrateFromV2() || autoSeat());
      showToast('Re-imported original allocation');
    }
  };
  const clearAll = () => {
    if (confirm('Clear ALL seating (empty every seat)?')) setState({ seating: {}, names: state.names });
  };

  const exportSite = () => {
    const data = {
      generated: new Date().toISOString(),
      tables: TABLES.map(t => {
        const o = state.offsets[t.id] || { dx: 0, dy: 0 };
        return { id: t.id, num: tableNums[t.id], capacity: t.cap, cx: t.cx + (o.dx || 0), cy: t.cy + (o.dy || 0) };
      }),
      guests: PEOPLE.map(p => {
        const s = state.seating[p.id];
        const pos = s ? SEAT_POS[s.table][s.seat] : null;
        const o = s ? (state.offsets[s.table] || { dx: 0, dy: 0 }) : { dx: 0, dy: 0 };
        return {
          id: p.id, name: displayName(state.names, p),
          group: GROUPS_BY_ID[p.groupId].label, groupId: p.groupId,
          category: GROUPS_BY_ID[p.groupId].category,
          table: s ? s.table : null, seat: s ? s.seat : null,
          x: pos ? pos.cx + (o.dx || 0) : null, y: pos ? pos.cy + (o.dy || 0) : null,
        };
      }),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'seating-data.json'; a.click();
    URL.revokeObjectURL(url);
    showToast('seating-data.json downloaded');
  };

  const exportCSV = () => {
    let csv = 'Table,Seat,Guest,Party,Category\n';
    [...TABLES].sort((a, b) => tableNums[a.id] - tableNums[b.id]).forEach(t => {
      const rows = PEOPLE.filter(p => state.seating[p.id] && state.seating[p.id].table === t.id)
        .map(p => ({ p, seat: state.seating[p.id].seat })).sort((a, b) => a.seat - b.seat);
      rows.forEach(({ p, seat }) => {
        const g = GROUPS_BY_ID[p.groupId];
        csv += `${tableNums[t.id]},${seat},"${displayName(state.names, p)}","${g.label}","${g.category}"\n`;
      });
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'seating.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  /* ---- turn-based sharing: save/load the whole plan as a file ---- */
  const planFileRef = useRef(null);
  const savePlan = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    a.href = url;
    a.download = `wedding-plan-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Plan saved — send this file to whoever edits next');
  };
  const loadPlanFile = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const st = JSON.parse(reader.result);
        if (!st || typeof st !== 'object' || !st.seating || !st.names) throw new Error('bad');
        Object.keys(st.seating).forEach(pid => { if (!PEOPLE_BY_ID[pid]) delete st.seating[pid]; });
        if (!st.offsets) st.offsets = {};
        setState(st);
        showToast('Plan loaded — this is now the live plan');
      } catch {
        alert("That file doesn't look like a wedding plan file (expected the JSON from 'Save plan').");
      }
    };
    reader.readAsText(file);
  };

  const handleUnitDrop = (payload, table, seat) => {
    if (payload.type === 'group') seatGroupAt(payload.groupId, table, seat);
    else if (payload.type === 'person') { seatPersonAt(payload.personId, table, seat); setSoloPid(null); }
  };

  const swapTables = (a, b) => {
    if (!a || !b || a === b) return;
    setState(prev => {
      const off = { ...prev.offsets };
      const cur = id => ({
        x: TABLES_BY_ID[id].cx + ((off[id] && off[id].dx) || 0),
        y: TABLES_BY_ID[id].cy + ((off[id] && off[id].dy) || 0),
      });
      const ca = cur(a), cb = cur(b);
      off[a] = { dx: cb.x - TABLES_BY_ID[a].cx, dy: cb.y - TABLES_BY_ID[a].cy };
      off[b] = { dx: ca.x - TABLES_BY_ID[b].cx, dy: ca.y - TABLES_BY_ID[b].cy };
      return { ...prev, offsets: off };
    });
    showToast(`Swapped Table ${tableNums[a]} ⇄ Table ${tableNums[b]}`);
  };

  const moveTableTo = (tableId, wx, wy) => {
    const t = TABLES_BY_ID[tableId];
    if (!t) return;
    setState(prev => ({
      ...prev,
      offsets: { ...prev.offsets, [tableId]: { dx: Math.round(wx - t.cx), dy: Math.round(wy - t.cy) } },
    }));
    showToast(`Moved Table ${tableNums[tableId]}`);
  };

  const primeSolo = (personId) => {
    // double-click can leave a text selection which hijacks the next drag — clear it
    try { const sel = window.getSelection(); if (sel) sel.removeAllRanges(); } catch {}
    setSoloPid(prev => {
      if (prev === personId) { showToast('Back to moving the whole party'); return null; }
      showToast(`${displayName(state.names, PEOPLE_BY_ID[personId])} moves alone next drag (still linked to party)`);
      return personId;
    });
  };

  const focusPerson = (personId) => {
    const s = state.seating[personId];
    if (s) setFocusReq({ table: s.table, seat: s.seat, at: Date.now() });
  };

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand"><h1>Dima &amp; Susie</h1><small>Seating Plan</small></div>
        <div className="stats">
          <span>Seated <b>{seatedCount}</b> / {TOTAL_GUESTS}</span>
          <span>Capacity <b>{TOTAL_CAPACITY}</b></span>
          <span>Tables <b>{TABLES.length}</b></span>
        </div>
        <div className="actions">
          <button onClick={savePlan} title="Download the whole plan as a file — send it to whoever edits next">Save plan</button>
          <button onClick={() => planFileRef.current && planFileRef.current.click()} title="Open a plan file someone sent you — replaces the current plan">Load plan</button>
          <input
            ref={planFileRef} type="file" accept=".json,application/json" style={{ display: 'none' }}
            onChange={e => { const f = e.target.files && e.target.files[0]; if (f) loadPlanFile(f); e.target.value = ''; }}
          />
          <button onClick={exportSite}>Export for website</button>
          <button onClick={exportCSV}>Export CSV</button>
          <button onClick={resetToMigration}>Re-import</button>
          <button onClick={clearAll}>Clear</button>
        </div>
      </header>

      <Floor
        state={state} soloPid={soloPid} focusReq={focusReq} drag={drag} tableNums={tableNums}
        onUnitDrop={handleUnitDrop} onPrimeSolo={primeSolo} onUnseatPerson={unseatPerson}
        onSwapTable={swapTables} onMoveTable={moveTableTo} startDrag={startDrag} floorApiRef={floorApiRef}
      />

      <Sidebar
        state={state} filter={filter} setFilter={setFilter} tableNums={tableNums}
        onUnseatGroup={unseatGroup} onUnseatPerson={unseatPerson}
        editingPersonId={editingPersonId} setEditingPersonId={setEditingPersonId}
        onRenamePerson={renamePerson} onFocusPerson={focusPerson} startDrag={startDrag}
      />

      {toast && <div className="toast">{toast}</div>}
      {drag && drag.started && (
        <div className="drag-ghost" style={{ left: drag.clientX + 14, top: drag.clientY + 6, borderColor: drag.color || 'var(--ink)' }}>
          {drag.kind === 'table' ? '⇄ ' : ''}{drag.label}
        </div>
      )}
    </div>
  );
}

/* ---------- FLOOR ---------- */
const FW = 1000, FH = 1600;
function Floor({ state, soloPid, focusReq, drag, tableNums, onUnitDrop, onPrimeSolo, onUnseatPerson, onSwapTable, onMoveTable, startDrag, floorApiRef }) {
  const wrapRef = useRef(null);
  const [view, setView] = useState({ x: 0, y: 0, k: 0.5 });
  const [panning, setPanning] = useState(false);
  const [hover, setHover] = useState(null);   // hit-test result during a drag
  const panRef = useRef(null);
  const artRef = useRef(null);
  const viewRef = useRef(view);
  const offsets = state.offsets || {};
  useEffect(() => { viewRef.current = view; }, [view]);

  useEffect(() => { if (artRef.current && !artRef.current.firstChild) artRef.current.innerHTML = FLOOR_SVG; }, []);

  /* screen point -> floor (world) coordinates */
  const toWorld = (clientX, clientY) => {
    const el = wrapRef.current; if (!el) return null;
    const r = el.getBoundingClientRect(); const v = viewRef.current;
    return { wx: (clientX - r.left - v.x) / v.k, wy: (clientY - r.top - v.y) / v.k };
  };

  /* convert a screen point to the nearest seat / table on the floor */
  const hitTest = (clientX, clientY) => {
    const w = toWorld(clientX, clientY); if (!w) return null;
    const { wx, wy } = w;
    let best = null, bd = 18;
    for (const s of SEATS) {
      const o = offsets[s.table] || {};
      const dx = (s.cx + (o.dx || 0)) - wx, dy = (s.cy + (o.dy || 0)) - wy;
      const dd = Math.hypot(dx, dy);
      if (dd < bd) { bd = dd; best = { type: 'seat', table: s.table, seat: s.num }; }
    }
    if (best) return best;
    let bt = null, btd = 46;
    for (const t of TABLES) {
      const o = offsets[t.id] || {};
      const dx = (t.cx + (o.dx || 0)) - wx, dy = (t.cy + (o.dy || 0)) - wy;
      const dd = Math.hypot(dx, dy);
      if (dd < btd) { btd = dd; bt = { type: 'table', tableId: t.id }; }
    }
    return bt;
  };

  /* expose hover/drop to App's global pointer listeners */
  useEffect(() => {
    floorApiRef.current = {
      hover: (cx, cy) => setHover(cx == null ? null : hitTest(cx, cy)),
      drop: (d, cx, cy) => {
        const t = hitTest(cx, cy);
        setHover(null);
        if (d.kind === 'table') {
          const target = t ? (t.type === 'table' ? t.tableId : t.table) : null;
          if (target && target !== d.tableId) {
            onSwapTable(d.tableId, target);
          } else {
            // dropped on empty floor: move the table there
            const w = toWorld(cx, cy);
            if (w && w.wx > 40 && w.wx < 960 && w.wy > 40 && w.wy < 1560) onMoveTable(d.tableId, w.wx, w.wy);
          }
          return;
        }
        if (!t) return;
        const payload = d.kind === 'person' ? { type: 'person', personId: d.personId } : { type: 'group', groupId: d.groupId };
        if (t.type === 'seat') onUnitDrop(payload, t.table, t.seat);
        else onUnitDrop(payload, t.tableId, null);
      },
    };
  });

  /* move whole table groups in the background art to match offsets */
  useEffect(() => {
    if (!artRef.current) return;
    TABLES.forEach(t => {
      const g = artRef.current.querySelector('#' + t.id);
      if (!g) return;
      const o = offsets[t.id];
      if (o && (o.dx || o.dy)) g.setAttribute('transform', `translate(${o.dx},${o.dy})`);
      else g.removeAttribute('transform');
    });
  }, [offsets]);

  /* keep artwork table numbers in sync with logical (position-based) numbering */
  useEffect(() => {
    if (!artRef.current) return;
    TABLES.forEach(t => {
      const el = artRef.current.querySelector('#' + t.id + '-label text');
      if (el && tableNums[t.id] != null) el.textContent = tableNums[t.id];
    });
  }, [tableNums, offsets]);

  const clampK = k => Math.min(6, Math.max(0.2, k));
  const fit = useCallback(() => {
    const el = wrapRef.current; if (!el) return;
    const { width, height } = el.getBoundingClientRect();
    if (width <= 0 || height <= 0) return;
    const k = Math.min(width / (FW + 80), height / (FH + 80));
    setView({ k, x: (width - FW * k) / 2, y: (height - FH * k) / 2 });
  }, []);
  const didFitRef = useRef(false);
  useEffect(() => {
    const el = wrapRef.current; if (!el) return;
    const tryFit = () => {
      const { width, height } = el.getBoundingClientRect();
      if (width > 0 && height > 0 && !didFitRef.current) { fit(); didFitRef.current = true; }
    };
    tryFit();
    const ro = new ResizeObserver(tryFit);
    ro.observe(el);
    const onResize = () => fit();
    window.addEventListener('resize', onResize);
    return () => { ro.disconnect(); window.removeEventListener('resize', onResize); };
  }, [fit]);

  const zoomAt = (cx, cy, factor) => {
    const el = wrapRef.current; const r = el.getBoundingClientRect();
    const mx = cx - r.left, my = cy - r.top;
    setView(v => { const k2 = clampK(v.k * factor); const s = k2 / v.k;
      return { k: k2, x: mx - (mx - v.x) * s, y: my - (my - v.y) * s }; });
  };

  useEffect(() => {
    const el = wrapRef.current; if (!el) return;
    const onWheel = (e) => { e.preventDefault(); zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.12 : 1/1.12); };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, []);

  /* animated focus/zoom to a seat */
  useEffect(() => {
    if (!focusReq) return;
    const pos = SEAT_POS[focusReq.table] && SEAT_POS[focusReq.table][focusReq.seat];
    if (!pos) return;
    const o = offsets[focusReq.table] || { dx: 0, dy: 0 };
    const px = pos.cx + (o.dx || 0), py = pos.cy + (o.dy || 0);
    const el = wrapRef.current; const r = el.getBoundingClientRect();
    const targetK = 2.6;
    const tx = r.width / 2 - px * targetK;
    const ty = r.height / 2 - py * targetK;
    const start = { ...view }; const t0 = performance.now(); const dur = 900;
    const ease = t => 1 - Math.pow(1 - t, 3);
    let raf;
    const step = (now) => {
      const t = Math.min(1, (now - t0) / dur); const e = ease(t);
      setView({ k: start.k + (targetK - start.k) * e, x: start.x + (tx - start.x) * e, y: start.y + (ty - start.y) * e });
      if (t < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [focusReq]);

  const onMouseDown = (e) => {
    if (e.button !== 0) return;
    if (e.target.closest('.zoom-controls')) return;
    panRef.current = { sx: e.clientX, sy: e.clientY, ox: view.x, oy: view.y };
    setPanning(true);
  };
  useEffect(() => {
    if (!panning) return;
    const move = (e) => { const p = panRef.current; setView(v => ({ ...v, x: p.ox + (e.clientX - p.sx), y: p.oy + (e.clientY - p.sy) })); };
    const up = () => setPanning(false);
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
    return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
  }, [panning]);

  const draggingUnit = drag && (drag.kind === 'person' || drag.kind === 'group');
  const draggingTable = drag && drag.kind === 'table';
  const hoverTableId = hover ? (hover.type === 'table' ? hover.tableId : hover.table) : null;

  return (
    <div ref={wrapRef} className={`floor-wrap ${panning ? 'panning' : ''} ${drag && drag.started ? 'dragging' : ''}`} onMouseDown={onMouseDown}>
      <div className="world" style={{ transform: `translate(${view.x}px, ${view.y}px) scale(${view.k})` }}>
        <div className="floor-art" ref={artRef}></div>
        <div className="hitlayer">
          {SEATS.map(seat => {
            const key = seat.table + '-' + seat.num;
            const o = offsets[seat.table] || { dx: 0, dy: 0 };
            const cx = seat.cx + (o.dx || 0), cy = seat.cy + (o.dy || 0);
            const pid = Object.keys(state.seating).find(id => state.seating[id].table === seat.table && state.seating[id].seat === seat.num);
            const p = pid ? PEOPLE_BY_ID[pid] : null;
            const col = p ? groupColor(p.groupId) : null;
            const isDrop = draggingUnit && hover && hover.type === 'seat' && hover.table === seat.table && hover.seat === seat.num;
            return (
              <div key={key}
                 className={`seat-node ${p ? 'occupied' : ''} ${soloPid === pid ? 'solo' : ''} ${isDrop ? 'seat-drop' : ''}`}
                 style={{ left: cx - 14, top: cy - 14, borderColor: p ? col : 'transparent' }}
                 onMouseDown={p ? (e) => {
                   if (e.button !== 0) return;
                   e.stopPropagation();
                   const soloThis = soloPid === pid || e.altKey || GROUPS_BY_ID[p.groupId].members.length === 1;
                   const info = soloThis
                     ? { kind: 'person', personId: pid, label: displayName(state.names, p), color: col }
                     : { kind: 'group', groupId: p.groupId, label: GROUPS_BY_ID[p.groupId].members.map(m => firstNameOf(displayName(state.names, m))).join(', '), color: col };
                   startDrag(info, e);
                 } : undefined}
                 onDoubleClick={p ? (e) => { e.stopPropagation(); onPrimeSolo(pid); } : undefined}
                 title={p ? `${displayName(state.names, p)} — party: ${GROUPS_BY_ID[p.groupId].label}\nDrag = move whole party · Hold Alt (or double-click first) = move just this person · drop on an occupied chair to swap` : 'Empty seat'}
              >
                {p && <span className="seat-name">{firstNameOf(displayName(state.names, p))}</span>}
              </div>
            );
          })}

          {TABLES.map(t => {
            const o = offsets[t.id] || { dx: 0, dy: 0 };
            const cx = t.cx + (o.dx || 0), cy = t.cy + (o.dy || 0);
            const isDrop = draggingTable && hoverTableId === t.id && drag.tableId !== t.id;
            return (
              <div key={t.id + '-handle'}
                 className={`table-handle ${isDrop ? 'table-drop' : ''}`}
                 style={{ left: cx - 27, top: cy - 27 }}
                 onMouseDown={(e) => {
                   if (e.button !== 0) return;
                   e.stopPropagation();
                   startDrag({ kind: 'table', tableId: t.id, label: 'Table ' + t.num }, e);
                 }}
                 title={`Table ${tableNums[t.id]} — drag onto another table to swap, or onto empty floor to move`}
              />
            );
          })}
        </div>
      </div>

      <div className="zoom-level">{Math.round(view.k * 100)}%</div>
      <div className="zoom-controls">
        <button onClick={() => { const r = wrapRef.current.getBoundingClientRect(); zoomAt(r.left + r.width/2, r.top + r.height/2, 1.3); }}>+</button>
        <button onClick={() => { const r = wrapRef.current.getBoundingClientRect(); zoomAt(r.left + r.width/2, r.top + r.height/2, 1/1.3); }}>−</button>
        <button onClick={fit} style={{ fontSize: '12px' }}>⤢</button>
      </div>
      <div className="zoom-hint">Scroll to zoom · drag background to pan · seats sharpen at any zoom</div>
    </div>
  );
}

/* ---------- SIDEBAR ---------- */
function Sidebar({ state, filter, setFilter, tableNums, onUnseatGroup, onUnseatPerson, editingPersonId, setEditingPersonId, onRenamePerson, onFocusPerson, startDrag }) {
  const [expanded, setExpanded] = useState({});
  const editRef = useRef(null);
  useEffect(() => { if (editingPersonId && editRef.current) editRef.current.select(); }, [editingPersonId]);

  const categories = useMemo(() => { const o = []; GROUPS.forEach(g => { if (!o.includes(g.category)) o.push(g.category); }); return o; }, []);
  const tableNumById = tableNums;

  const groupInfo = (g) => {
    const tables = new Set(); let n = 0;
    g.members.forEach(p => { const s = state.seating[p.id]; if (s) { n++; tables.add(s.table); } });
    return { n, tables: [...tables] };
  };

  const visible = GROUPS.filter(g => {
    if (filter === 'all') return true;
    if (filter === 'unseated') return g.members.some(p => !state.seating[p.id]);
    return g.category === filter;
  });
  const byCat = {}; visible.forEach(g => (byCat[g.category] = byCat[g.category] || []).push(g));
  const totalUnseated = PEOPLE.filter(p => !state.seating[p.id]).length;

  return (
    <aside className="sidebar">
      <div className="side-head"><h2>Guests</h2><div className="sub">{GROUPS.length} parties · {totalUnseated} unseated</div></div>
      <div className="filter">
        <button className={filter==='all'?'active':''} onClick={() => setFilter('all')}>All</button>
        <button className={filter==='unseated'?'active':''} onClick={() => setFilter('unseated')}>Unseated</button>
        {categories.map(c => <button key={c} className={filter===c?'active':''} onClick={() => setFilter(c)}>{c}</button>)}
      </div>
      <div className="groups">
        {Object.entries(byCat).map(([cat, gs]) => {
          const total = gs.reduce((s, g) => s + g.members.length, 0);
          return (
            <div key={cat} className="cat-section">
              <div className="cat-title"><span>{cat}</span><span className="pill">{gs.length} parties · {total} ppl</span></div>
              {gs.map(g => {
                const { n, tables } = groupInfo(g);
                const fully = n === g.members.length && n > 0;
                const isOpen = !!expanded[g.id];
                const where = n === 0 ? null : tables.length > 1
                  ? `split: T${tables.map(t => tableNumById[t]).join(' + T')}`
                  : `Table ${tableNumById[tables[0]]}${fully ? '' : ` (${n}/${g.members.length})`}`;
                return (
                  <div key={g.id} className={`group ${fully ? 'seated' : ''}`} style={{ '--gc': groupColor(g.id) }}>
                    <div className="g-head"
                      onMouseDown={e => { if (e.button !== 0 || e.target.closest('.g-expand')) return; startDrag({ kind: 'group', groupId: g.id, label: g.members.map(p => firstNameOf(displayName(state.names, p))).join(', '), color: groupColor(g.id) }, e); }}
                      onDoubleClick={() => n > 0 && onUnseatGroup(g.id)}
                      title={`${g.members.map(p => displayName(state.names, p)).join(', ')}\nDrag onto a chair to seat this party${n>0?' · Double-click to unseat':''}`}>
                      <span className="g-dot" />
                      <div className="g-label">
                        {g.members.map(p => displayName(state.names, p)).join(', ')}
                        {where && <div className={`g-where ${tables.length>1||!fully?'partial':''}`}>{where}</div>}
                      </div>
                      <span className="g-badge">{g.members.length}</span>
                      <button className={`g-expand ${isOpen?'open':''}`} onClick={e => { e.stopPropagation(); setExpanded(x => ({ ...x, [g.id]: !x[g.id] })); }}>▸</button>
                    </div>
                    {isOpen && (
                      <div className="g-members">
                        {g.members.map(p => {
                          const s = state.seating[p.id]; const isEd = editingPersonId === p.id;
                          return (
                            <div key={p.id} className="member"
                              onMouseDown={e => { if (e.button !== 0 || isEd || e.target.closest('.m-edit')) return; startDrag({ kind: 'person', personId: p.id, label: displayName(state.names, p), color: groupColor(g.id) }, e); }}
                              onDoubleClick={() => s && onFocusPerson(p.id)}
                              title={s ? 'Drag to move just this person · Double-click to zoom to their seat' : 'Drag to seat just this person'}>
                              <span className="g-dot" style={{ background: groupColor(g.id) }} />
                              <span className="m-name">
                                {isEd ? (
                                  <input ref={editRef} defaultValue={displayName(state.names, p)}
                                    onBlur={e => { onRenamePerson(p.id, e.target.value); setEditingPersonId(null); }}
                                    onKeyDown={e => { if (e.key==='Enter') e.target.blur(); if (e.key==='Escape') setEditingPersonId(null); }} />
                                ) : displayName(state.names, p)}
                              </span>
                              {s && !isEd && <span className="m-at">T{tableNumById[s.table]}·s{s.seat}</span>}
                              {!isEd && <button className="m-edit" title="Edit full name" onClick={e => { e.stopPropagation(); setEditingPersonId(p.id); }}>✎</button>}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
      <div className="hint">
        Names show inside each chair — <b>scroll to zoom right down to a seat</b>. Drag a chair = move the whole party · <b>hold Alt while dragging = move just that person</b> (or double-click the chair first) · drop onto an occupied chair to <b>swap</b> · drag a table's centre onto another table to swap, or onto <b>empty floor to move it there</b> · expand ▸ to edit <b>full names</b> or double-click a person to fly the camera to their seat.
      </div>
    </aside>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
