<title>Susie & Dima — Find Your Seat (QR card)</title>
<style>
  :root{ --card:#fbf3dd; --plum:#241233; --gold:#b9902f; --gold2:#a87f22; --line:rgba(185,144,47,.5); }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:#e7dcc2;color:var(--plum);
    font-family:Georgia,'Times New Roman',serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .card{position:relative;width:min(94vw,470px);background:
      radial-gradient(120% 75% at 50% 0%, #fdf6e4, var(--card) 72%);
    border:1.5px solid var(--gold);border-radius:14px;
    padding:42px 40px 40px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:26px;
    box-shadow:0 18px 50px rgba(40,20,15,.22);}
  .card::before{content:"";position:absolute;inset:8px;border:1px solid rgba(185,144,47,.4);border-radius:9px;pointer-events:none;}
  .monogram{width:74px;height:74px;display:block;}
  .headline{font-size:39px;line-height:1.1;margin:0;font-weight:700;color:var(--plum);
    letter-spacing:.005em;text-wrap:balance;max-width:12ch;}
  .headline em{font-style:italic;color:var(--gold2);white-space:nowrap;}
  .qr{width:300px;max-width:78%;aspect-ratio:1/1;padding:15px;background:#fdfbf4;
    border:1px solid var(--line);border-radius:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);}
  .qr svg{display:block;width:100%;height:100%;border-radius:3px;}
  @media print{
    @page{size:A5;margin:9mm;}
    body{background:#fff;min-height:auto;padding:0;}
    .card{box-shadow:none;width:100%;max-width:none;border-radius:0;height:100%;justify-content:center;gap:30px;}
    .card::before{inset:5mm;}
  }
</style>
</head>
