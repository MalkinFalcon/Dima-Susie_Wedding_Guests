<title>Susie & Dima — Find Your Seat (QR card)</title>
<style>
  :root{
    --ground:#f6ecd4; --card:#fbf3dd; --ink:#2a1526; --plum:#241233;
    --gold:#b9902f; --goldsoft:#c9a557; --rose:#b06b62; --line:rgba(185,144,47,.5);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:#e7dcc2;color:var(--ink);
    font-family:Georgia,'Times New Roman',serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:28px;}
  .card{position:relative;width:min(92vw,470px);background:
      radial-gradient(120% 80% at 50% 0%, #fdf6e4, var(--card) 70%);
    border:1.5px solid var(--gold);border-radius:14px;
    padding:40px 40px 34px;text-align:center;
    box-shadow:0 18px 50px rgba(40,20,15,.22);}
  .card::before{content:"";position:absolute;inset:8px;border:1px solid rgba(185,144,47,.4);border-radius:9px;pointer-events:none;}
  .eyebrow{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
    font-size:10.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--rose);margin:0 0 14px;}
  .monogram{width:60px;height:60px;display:block;margin:0 auto 12px;}
  .names{font-size:41px;line-height:1;margin:0;color:var(--plum);letter-spacing:.01em;}
  .names .amp{display:inline-block;font-size:.5em;color:var(--gold);vertical-align:middle;margin:0 .12em;font-style:italic;}
  .rule{width:96px;height:1px;margin:20px auto;background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative;}
  .rule::before{content:"✦";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    color:var(--gold);font-size:11px;background:var(--card);padding:0 8px;}
  .prompt{font-size:23px;line-height:1.25;margin:0 0 3px;color:var(--ink);}
  .prompt-ru{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:12.5px;letter-spacing:.02em;color:var(--rose);margin:0 0 20px;}
  .qr{width:230px;height:230px;margin:0 auto;padding:14px;background:#fdfbf4;
    border:1px solid var(--line);border-radius:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);}
  .qr svg{display:block;width:100%;height:100%;border-radius:3px;}
  .url{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:13px;letter-spacing:.06em;
    color:var(--plum);margin:18px 0 4px;font-weight:600;}
  .help{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:11.5px;color:var(--rose);margin:0;}
  @media print{
    @page{margin:14mm;}
    body{background:#fff;min-height:auto;padding:0;}
    .card{box-shadow:none;width:100%;max-width:460px;margin:0 auto;}
  }
</style>
